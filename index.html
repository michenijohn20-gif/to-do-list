<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <div class="container mt-5" style="max-width: 520px;">
    <h1 class="mb-4">My Todo List</h1>

    <form id="todoForm">
      <div class="input-group mb-3">
  <input type="text" id="todoInput" class="form-control" placeholder="What needs to be done?" />
  <select id="priorityInput" class="form-select" style="max-width: 130px;">
    <option value="high">🔴 High</option>
    <option value="medium">🟡 Medium</option>
    <option value="low">🟢 Low</option>
  </select>
  <input type="date" id="deadlineInput" class="form-control" style="max-width: 160px;" />
  <button type="submit" id="addBtn" class="btn btn-dark">Add Task</button>
</div>

    </form>

    <ul class="list-group" id="todoList"></ul>

    <small class="text-muted mt-2 d-block" id="counter">0 tasks left</small>
  </div>

  <script src="index.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
